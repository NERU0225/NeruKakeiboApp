<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="家計簿">
<meta name="theme-color" content="#FFFFFF">
<link rel="apple-touch-icon" href="./icon-180.png">
<link rel="icon" href="./icon-192.png">
<link rel="manifest" href="./manifest.json">
<title>家計簿</title>
<style>
  :root{
    --bg:#F4F5F7;--card:#FFFFFF;--line:#E6E8EB;--text:#1A1D21;--sub:#8B9199;
    --blue:#1279D4;--red:#E8543F;--green:#17A673;--radius:12px;--tabh:60px;
    --font:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.6;
    -webkit-text-size-adjust:100%;overscroll-behavior-y:none}
  /* iOSでフォーカス時に拡大しないよう入力欄は16px以上 */
  input,select,textarea,button{font-family:var(--font)}
  input,select,textarea{font-size:16px}
  .app{max-width:520px;margin:0 auto;padding-bottom:calc(var(--tabh) + env(safe-area-inset-bottom) + 12px)}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}

  header{position:sticky;top:0;z-index:5;background:var(--card);border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;gap:6px;
    padding:calc(12px + env(safe-area-inset-top)) 16px 12px}
  header button{background:none;border:none;color:var(--sub);font-size:18px;padding:6px 12px;cursor:pointer;border-radius:8px}
  #monthLabel{font-size:16px;font-weight:600;color:var(--text);min-width:8.5em;text-align:center}
  #monthLabel::after{content:' ▾';color:var(--sub);font-size:11px}

  main{padding:14px}
  section[hidden]{display:none}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px}
  .card-title{font-size:12px;font-weight:600;color:var(--sub);margin:0 0 12px}
  .b-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
  .link{background:none;border:none;color:var(--blue);font-size:13px;padding:0;cursor:pointer}
  .hint{font-size:11px;color:var(--sub);margin:0;line-height:1.55}
  .warn-banner{background:#FDECEA;color:#A32A1B;font-size:12px;padding:10px 14px;text-align:center}

  .sum{display:flex;text-align:center}
  .sum>div{flex:1}
  .sum span{display:block;font-size:11px;color:var(--sub);margin-bottom:3px}
  .sum b{font-size:17px;font-weight:600}
  .sum .out b{color:var(--red)}
  .sum .in b{color:var(--blue)}
  .sum .net b.minus{color:var(--red)}

  .b-remain{font-size:30px;font-weight:700}
  .b-remain.over{color:var(--red)}
  .b-remain small{font-size:13px;font-weight:500;color:var(--sub);margin-left:6px}
  .bar{height:8px;background:#EDEFF2;border-radius:99px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--green);border-radius:99px;transition:width .3s ease}
  .bar i.warn{background:#E9A23B}
  .bar i.over{background:var(--red)}
  .b-foot{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-top:7px}

  .donut-wrap{position:relative;width:190px;margin:4px auto 18px}
  .donut{display:block;width:100%;transform:rotate(-90deg)}
  .donut-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .donut-c span{font-size:11px;color:var(--sub)}
  .donut-c b{font-size:22px;font-weight:700}

  .crow{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
  .crow:first-child{border-top:none}
  .crow.has-sub{cursor:pointer}
  .caret{display:inline-block;color:var(--sub);font-size:10px;margin-right:5px;transition:transform .15s ease}
  .caret.open{transform:rotate(90deg)}
  .subrow{display:flex;align-items:center;gap:10px;padding:7px 0 7px 19px;background:#FAFBFC}
  .subrow .cname{font-size:13px;color:var(--sub)}
  .subrow .camt{font-size:13px;font-weight:500}
  .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .cname{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cpct{font-size:12px;color:var(--sub);width:3em;text-align:right}
  .camt{font-size:14px;font-weight:600;width:6.5em;text-align:right}

  .brow{padding:12px 0;border-top:1px solid var(--line)}
  .brow:first-child{border-top:none}
  .brow-t{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .brow-t .cname{font-size:14px}
  .brow input{width:6.2em;text-align:right;border:1px solid var(--line);border-radius:6px;
    padding:5px 7px;background:var(--bg);font-variant-numeric:tabular-nums}

  .daygroup{margin-bottom:12px}
  .dayhead{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);padding:0 4px 5px}
  .items{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .item{display:flex;align-items:center;gap:11px;padding:12px 14px;border-top:1px solid var(--line);
    cursor:pointer;background:none;width:100%;text-align:left;color:inherit}
  .item:first-child{border-top:none}
  .item:active{background:var(--bg)}
  .icon{width:34px;height:34px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:16px}
  .i-main{flex:1;min-width:0;overflow:hidden}
  .i-title{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .i-sub{font-size:12px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .i-amt{flex:none;font-size:15px;font-weight:600;white-space:nowrap;padding-left:8px}
  .i-amt.in{color:var(--blue)}
  .badge{display:inline-block;background:var(--bg);border-radius:5px;font-size:10px;color:var(--sub);padding:1px 5px;margin-left:5px}
  .empty{text-align:center;color:var(--sub);font-size:13px;padding:34px 0}

  .mrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
  .mrow:first-child{border-top:none}
  .mrow .move{background:none;border:none;color:var(--sub);cursor:pointer;font-size:14px;padding:4px 6px;line-height:1}
  .mrow .move:disabled{opacity:.25}
  .mrow .edit{background:var(--bg);border:none;border-radius:7px;color:var(--sub);font-size:12px;padding:6px 11px;cursor:pointer}
  .addcat{width:100%;background:var(--bg);border:1px dashed var(--line);border-radius:9px;color:var(--blue);
    font-size:14px;padding:11px;cursor:pointer;margin-top:12px}

  .tabs{position:fixed;left:0;right:0;bottom:0;z-index:6;display:flex;background:var(--card);
    border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
  .tabs button{flex:1;background:none;border:none;cursor:pointer;color:var(--sub);height:var(--tabh);
    font-size:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
  .tabs button i{font-size:18px;font-style:normal;line-height:1}
  .tabs button[aria-selected=true]{color:var(--blue);font-weight:600}
  .fab{position:fixed;right:calc(50% - 260px + 16px);bottom:calc(var(--tabh) + env(safe-area-inset-bottom) + 16px);
    z-index:6;width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;background:var(--blue);
    color:#fff;font-size:28px;line-height:1;box-shadow:0 4px 14px rgba(18,121,212,.4)}
  @media(max-width:551px){.fab{right:16px}}

  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:8;opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:50%;bottom:0;transform:translateX(-50%) translateY(100%);width:100%;max-width:520px;
    z-index:9;background:var(--card);border-radius:16px 16px 0 0;padding:6px 16px calc(20px + env(safe-area-inset-bottom));
    transition:transform .25s ease;max-height:90vh;overflow:auto;-webkit-overflow-scrolling:touch}
  .sheet.open{transform:translateX(-50%) translateY(0)}
  .grab{width:36px;height:4px;background:var(--line);border-radius:9px;margin:6px auto 12px}
  .sheet h3{font-size:15px;margin:0 0 14px}
  .seg{display:flex;background:var(--bg);border-radius:9px;padding:3px;margin-bottom:14px}
  .seg button{flex:1;border:none;background:none;border-radius:7px;padding:9px 0;cursor:pointer;font-size:14px;color:var(--sub)}
  .seg button[aria-pressed=true]{background:var(--card);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}

  .field{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line)}
  .field:first-of-type{border-top:none}
  .field label{width:3.6em;font-size:13px;color:var(--sub);flex:none}
  .field input,.field select{flex:1;border:none;background:none;outline:none;color:var(--text);padding:0;min-width:0}
  #fStore{font-size:17px;font-weight:600}

  .lines{margin:6px 0 0}
  .line{background:var(--bg);border-radius:10px;padding:9px 10px;margin-bottom:8px}
  .line-a{display:flex;gap:8px;align-items:center;margin-bottom:7px}
  .line-a input.nm{flex:1;min-width:0;border:none;background:none;outline:none;padding:2px 0}
  .line-b{display:flex;gap:8px;align-items:center;margin-bottom:7px}
  .line-b .qty-wrap{display:flex;align-items:center;gap:3px;color:var(--sub);font-size:13px}
  .line-b input.am{width:5.4em;text-align:right;border:none;background:none;outline:none;
    font-weight:600;font-variant-numeric:tabular-nums;padding:2px 0}
  .line-b input.qty{width:2.6em;text-align:right;border:none;background:none;outline:none;
    font-variant-numeric:tabular-nums;padding:2px 0;color:var(--text)}
  .line-b .sub{margin-left:auto;font-weight:600;font-variant-numeric:tabular-nums;font-size:14px;white-space:nowrap}
  .line-c{display:flex;gap:8px;align-items:center}
  .line-c select{flex:1;min-width:0;color:var(--text);border:1px solid var(--line);border-radius:7px;background:var(--card);padding:7px 8px}
  .line-c select[data-f="sub"]{flex:0 1 40%;color:var(--sub)}
  .line-c .rm{background:none;border:none;color:var(--sub);font-size:15px;cursor:pointer;padding:6px 8px;line-height:1}
  .addline{width:100%;background:none;border:1px dashed var(--line);border-radius:9px;color:var(--blue);
    font-size:13px;padding:10px;cursor:pointer}
  .total{display:flex;justify-content:space-between;align-items:baseline;border-top:2px solid var(--line);margin-top:12px;padding-top:12px}
  .total span{font-size:13px;color:var(--sub)}
  .total b{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums}

  .picker{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
  .picker button{width:40px;height:40px;border-radius:9px;border:1px solid var(--line);background:var(--bg);
    cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
  .picker button[aria-pressed=true]{border-color:var(--blue);border-width:2px;background:#F0F7FE}
  .picker.colors button{border-radius:50%;width:32px;height:32px;border:2px solid transparent}
  .picker.colors button[aria-pressed=true]{border-color:var(--text)}
  .subrow-edit{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--line)}
  .subrow-edit:first-child{border-top:none}
  .subrow-edit .sname{flex:1;font-size:14px}
  .subrow-edit .sdel{background:none;border:none;color:var(--sub);font-size:15px;cursor:pointer;padding:4px 6px}
  .subadd{display:flex;gap:8px;margin-top:8px}
  .subadd input{flex:1;border:1px solid var(--line);border-radius:8px;padding:9px 10px;background:var(--bg)}
  .subadd .btn{flex:0 0 auto;padding:9px 16px}

  /* 年月ジャンプ */
  .mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
  .mgrid button{background:var(--bg);border:1px solid transparent;border-radius:10px;padding:11px 4px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:2px}
  .mgrid button b{font-size:15px;font-weight:600;color:var(--text)}
  .mgrid button span{font-size:10px;color:var(--sub);font-variant-numeric:tabular-nums;min-height:14px}
  .mgrid button[aria-current=true]{border-color:var(--blue);background:#F0F7FE}

  .actions{display:flex;gap:10px;margin-top:16px}
  .btn{flex:1;border:none;border-radius:10px;padding:14px;cursor:pointer;font-size:15px;font-weight:600}
  .btn-primary{background:var(--blue);color:#fff}
  .btn-ghost{flex:0 0 auto;background:var(--bg);color:var(--red);padding:14px 18px}
  .btn-sub{background:var(--bg);color:var(--text)}
  .yearsel{border:1px solid var(--line);border-radius:7px;padding:7px 8px;background:var(--card);color:var(--text)}

  .toast{position:fixed;left:50%;top:calc(env(safe-area-inset-top) + 10px);transform:translateX(-50%) translateY(-16px);
    background:#25292E;color:#fff;font-size:13px;padding:10px 18px;border-radius:99px;z-index:20;
    box-shadow:0 4px 14px rgba(0,0,0,.18);opacity:0;pointer-events:none;
    transition:opacity .22s ease, transform .22s ease}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  :focus-visible{outline:2px solid var(--blue);outline-offset:2px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <div class="warn-banner" id="warnBanner" hidden></div>
  <header>
    <button id="prev" aria-label="前の月">‹</button>
    <button id="monthLabel" class="num">—</button>
    <button id="next" aria-label="次の月">›</button>
  </header>

  <main>
    <section id="tab-home">
      <div class="card">
        <p class="card-title">今月の収支</p>
        <div class="sum num">
          <div class="out"><span>支出</span><b id="sOut">¥0</b></div>
          <div class="in"><span>収入</span><b id="sIn">¥0</b></div>
          <div class="net"><span>差引</span><b id="sNet">¥0</b></div>
        </div>
      </div>
      <div class="card">
        <div class="b-head">
          <p class="card-title" style="margin:0">予算の残り</p>
          <button class="link" data-goto="budget">予算を設定</button>
        </div>
        <div class="b-remain num" id="bRemain">—</div>
        <div class="bar"><i id="bBar" style="width:0"></i></div>
        <div class="b-foot"><span id="bUsed"></span><span id="bTotal"></span></div>
      </div>
      <div class="card">
        <div class="b-head">
          <p class="card-title" style="margin:0">最近の入出金</p>
          <button class="link" data-goto="book">すべて見る</button>
        </div>
        <div id="recent"></div>
      </div>
    </section>

    <section id="tab-book" hidden>
      <div class="card">
        <p class="card-title">支出の内訳</p>
        <div class="donut-wrap">
          <svg class="donut" viewBox="0 0 42 42" id="donut" role="img" aria-label="カテゴリ別支出の割合"></svg>
          <div class="donut-c num"><span>支出合計</span><b id="dTotal">¥0</b></div>
        </div>
        <div id="catList"></div>
      </div>
      <div id="history"></div>
    </section>

    <section id="tab-budget" hidden>
      <div class="card">
        <p class="card-title">今月の予算</p>
        <div class="brow">
          <div class="brow-t">
            <span class="cname">支出の合計</span>
            <input type="number" id="totalBudget" inputmode="numeric" placeholder="0" min="0">
          </div>
          <div class="bar"><i id="tbBar" style="width:0"></i></div>
          <div class="b-foot"><span id="tbUsed"></span><span id="tbLeft"></span></div>
        </div>
      </div>
      <div class="card">
        <div class="b-head">
          <p class="card-title" style="margin:0">カテゴリ別の予算</p>
          <button class="link" id="copyPrev">先月からコピー</button>
        </div>
        <div id="catBudgets"></div>
      </div>
    </section>

    <section id="tab-set" hidden>
      <div class="card">
        <p class="card-title">カテゴリ</p>
        <div class="seg" id="mgSeg">
          <button type="button" data-type="expense" aria-pressed="true">支出</button>
          <button type="button" data-type="income" aria-pressed="false">収入</button>
        </div>
        <div id="mgList"></div>
        <button class="addcat" id="addCat">＋ カテゴリを追加</button>
      </div>

      <div class="card">
        <p class="card-title">バックアップ</p>
        <p class="hint" id="whereHint" style="margin-bottom:14px"></p>
        <div class="field" style="border:none;padding-top:0">
          <label for="yearSel">年</label>
          <select class="yearsel" id="yearSel" style="flex:1"></select>
          <button class="btn btn-sub" id="expOne" style="flex:0 0 auto;padding:8px 14px;font-size:13px">書き出す</button>
        </div>
        <div class="actions" style="margin-top:6px">
          <button class="btn btn-sub" id="expAll">全部まとめて</button>
          <button class="btn btn-sub" id="impBtn">読み込む</button>
        </div>
        <input type="file" id="impFile" accept=".json,application/json,text/plain" hidden>
        <p class="hint" style="margin-top:12px">書き出すと共有シートが開くので「ファイルに保存」でiCloud等へ。読み込むと、ファイルに入っている年のデータが今のデータを上書きします。</p>
      </div>

      <div class="card">
        <p class="card-title">データを消す</p>
        <button class="link" id="wipe" style="color:var(--red)">すべてのデータを消す</button>
      </div>
    </section>
  </main>
</div>

<button class="fab" id="fab" aria-label="入力する">＋</button>

<nav class="tabs" role="tablist">
  <button data-tab="home" role="tab" aria-selected="true"><i>☰</i>ホーム</button>
  <button data-tab="book" role="tab" aria-selected="false"><i>◕</i>家計簿</button>
  <button data-tab="budget" role="tab" aria-selected="false"><i>◧</i>予算</button>
  <button data-tab="set" role="tab" aria-selected="false"><i>⚙</i>設定</button>
</nav>

<div class="scrim" id="scrim"></div>

<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="入力">
  <div class="grab"></div>
  <div class="seg" id="typeSeg">
    <button type="button" data-type="expense" aria-pressed="true">支出</button>
    <button type="button" data-type="income" aria-pressed="false">収入</button>
  </div>
  <div class="field"><label for="fStore" id="storeLabel">店名</label><input type="text" id="fStore" list="storeList" placeholder="セブンイレブン" maxlength="30"></div>
  <datalist id="storeList"></datalist>
  <div class="field"><label for="fDate">日付</label><input type="date" id="fDate"></div>
  <div class="field"><label for="fMemo">メモ</label><input type="text" id="fMemo" placeholder="任意" maxlength="40"></div>
  <p class="card-title" style="margin:16px 0 0">明細</p>
  <div class="lines" id="lines"></div>
  <button class="addline" id="addLine">＋ 明細を追加</button>
  <div class="total"><span>合計</span><b id="lineTotal">¥0</b></div>
  <div class="actions">
    <button class="btn btn-ghost" id="del" hidden>削除</button>
    <button class="btn btn-primary" id="saveBtn">保存</button>
  </div>
</div>

<div class="sheet" id="catSheet" role="dialog" aria-modal="true" aria-label="カテゴリの編集">
  <div class="grab"></div>
  <h3 id="csTitle">カテゴリを追加</h3>
  <div class="field"><label for="csName">名前</label><input type="text" id="csName" placeholder="例：タバコ" maxlength="12"></div>
  <p class="hint" style="margin:14px 0 6px">アイコン</p>
  <div class="picker" id="csIcons"></div>
  <p class="hint" style="margin:14px 0 6px">色</p>
  <div class="picker colors" id="csColors"></div>
  <div id="csSubWrap" hidden>
    <p class="hint" style="margin:16px 0 6px">サブカテゴリ（任意）</p>
    <div id="csSubList"></div>
    <div class="subadd">
      <input type="text" id="csSubInput" placeholder="例：飲み物" maxlength="12">
      <button type="button" class="btn btn-sub" id="csSubAdd">追加</button>
    </div>
  </div>
  <div class="actions">
    <button class="btn btn-ghost" id="csDel" hidden>削除</button>
    <button class="btn btn-primary" id="csSave">保存</button>
  </div>
</div>

<div class="sheet" id="ymSheet" role="dialog" aria-modal="true" aria-label="年月をえらぶ">
  <div class="grab"></div>
  <h3>年月をえらぶ</h3>
  <div class="field" style="border:none;padding-top:0">
    <label for="ySel">年</label>
    <select class="yearsel" id="ySel" style="flex:1"></select>
  </div>
  <div class="mgrid" id="mGrid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ 定数 ============ */
const MK='kakeibo:meta', YK=y=>'kakeibo:y:'+y;
const DEFAULTS={
  expense:[['食費','🍚','#F2725C',['食料品','外食','飲み物','お菓子']],['日用品','🧴','#F0A03C',[]],['住居','🏠','#8B6FD4',[]],
    ['水道光熱','💡','#3EA8C4',['電気','ガス','水道']],['通信','📱','#4C8BE8',[]],['交通','🚃','#38B08A',[]],
    ['医療','💊','#E86B9E',[]],['教育','📚','#6C7BD9',[]],['娯楽','🎮','#E5B93C',[]],
    ['交際','🍻','#C4784E',[]],['衣服','👕','#5FBF7A',[]],['その他','📦','#9AA3AC',[]]],
  income:[['給与','💰','#1279D4',[]],['賞与','🎁','#17A673',[]],['副収入','💻','#4C8BE8',[]],
    ['臨時収入','✨','#E5B93C',[]],['その他','📦','#9AA3AC',[]]]
};
const ICONS=['🍚','🍜','🍞','🍎','☕','🍻','🚬','🍰','🧴','🧻','🏠','🔑','💡','🚿','📱','💻','🚃','🚗','⛽','💊','🏥','📚','✏️','🎮','🎬','🎵','👕','👟','💄','💇','🎁','✈️','🏨','🐶','🧒','💰','📈','🏦','💳','🧾','🎫','✨','📦','🎂'];
const COLORS=['#F2725C','#F0A03C','#E5B93C','#5FBF7A','#38B08A','#3EA8C4','#4C8BE8','#1279D4','#6C7BD9','#8B6FD4','#E86B9E','#C4784E','#9AA3AC','#5A6470'];
const FALLBACK={name:'未分類',icon:'📦',color:'#9AA3AC'};

/* ============ Service Worker（オフライン起動） ============ */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

/* ============ 保存 ============ */
const useChat=!!window.storage;
let canSave=true;
if(!useChat){
  try{localStorage.setItem('kakeibo:t','1');localStorage.removeItem('kakeibo:t')}catch(e){canSave=false}
}
const store={
  async get(k){
    if(useChat){try{const r=await window.storage.get(k);return r&&r.value?JSON.parse(r.value):null}catch(e){return null}}
    try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}
  },
  async set(k,v){
    const s=JSON.stringify(v);
    if(useChat){try{await window.storage.set(k,s);return true}catch(e){toast('保存できませんでした');return false}}
    try{localStorage.setItem(k,s);return true}catch(e){toast('保存できませんでした（容量不足かも）');return false}
  }
};

/* ============ 状態 ============ */
let meta={cats:null,years:[]};
const cache={};
let cur=new Date(), type='expense', editId=null, lines=[];
let mgType='expense', csEdit=null, csIcon='📦', csColor='#9AA3AC', csSubs=[];
const openCats=new Set();

const $=i=>document.getElementById(i);
const yen=n=>'¥'+Math.round(n).toLocaleString('ja-JP');
const mkey=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let toastTimer=null;
const toast=m=>{const t=$('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1900)};
const cats=t=>(meta.cats&&meta.cats[t])||[];
const cmeta=(t,n)=>cats(t).find(c=>c.name===n)||FALLBACK;
const subsOf=(t,n)=>{const c=cats(t).find(x=>x.name===n);return (c&&c.subs)||[]};
const lineSub=i=>Math.round((Number(i.amount)||0)*(i.qty||1));
const total=e=>e.items.reduce((s,i)=>s+lineSub(i),0);
const Y=()=>cur.getFullYear();
const blank=()=>({name:'',amount:'',qty:1,category:(cats(type)[0]||FALLBACK).name,sub:''});

function seedCats(){
  meta.cats={};
  for(const t of ['expense','income'])
    meta.cats[t]=DEFAULTS[t].map(([name,icon,color,subs])=>({name,icon,color,subs:subs?[...subs]:[]}));
}
async function year(y){
  if(!cache[y]) cache[y]=await store.get(YK(y))||{entries:[],budgets:{},catBudgets:{}};
  return cache[y];
}
async function saveYear(y){
  await store.set(YK(y),cache[y]);
  if(!meta.years.includes(y)){meta.years.push(y);meta.years.sort()}
  await store.set(MK,meta);
}
const saveMeta=()=>store.set(MK,meta);

async function migrate(){
  const old=await store.get('kakeibo:v1');
  if(!old||!old.entries)return;
  if(old.cats)meta.cats=old.cats;
  const byY={};
  const slot=y=>byY[y]=byY[y]||{entries:[],budgets:{},catBudgets:{}};
  old.entries.forEach(e=>{
    slot(+e.date.slice(0,4)).entries.push({id:e.id,date:e.date,type:e.type,store:e.store||'',memo:'',
      items:[{name:e.memo||'',category:e.category,amount:e.amount,qty:1}]});
  });
  for(const [k,v] of Object.entries(old.budgets||{}))slot(+k.slice(0,4)).budgets[k]=v;
  for(const [k,v] of Object.entries(old.catBudgets||{}))slot(+k.slice(0,4)).catBudgets[k]=v;
  for(const [y,d] of Object.entries(byY)){cache[+y]=d;await saveYear(+y)}
  await store.set('kakeibo:v1',{migrated:true});
}

/* ============ 描画 ============ */
async function render(){
  const y=Y(), k=mkey(cur), d=await year(y);
  $('monthLabel').textContent=y+'年'+(cur.getMonth()+1)+'月';
  const es=d.entries.filter(e=>e.date.slice(0,7)===k)
    .sort((a,b)=>a.date<b.date?1:a.date>b.date?-1:b.id-a.id);

  const out=es.filter(e=>e.type==='expense').reduce((s,e)=>s+total(e),0);
  const inc=es.filter(e=>e.type==='income').reduce((s,e)=>s+total(e),0);
  $('sOut').textContent=yen(out);$('sIn').textContent=yen(inc);
  const net=inc-out;
  $('sNet').textContent=(net<0?'−':'')+yen(Math.abs(net));
  $('sNet').classList.toggle('minus',net<0);

  const b=d.budgets[k]||0, over=b&&out>b, pct=b?out/b*100:0;
  $('bRemain').innerHTML=b?((over?'−':'')+yen(Math.abs(b-out))+'<small>'+(over?'超過':'残り')+'</small>'):'<small>予算が未設定です</small>';
  $('bRemain').classList.toggle('over',!!over);
  $('bBar').style.width=Math.min(100,pct)+'%';
  $('bBar').className=over?'over':pct>=80?'warn':'';
  $('bUsed').textContent=b?Math.round(pct)+'% 使用':'';
  $('bTotal').textContent=b?'予算 '+yen(b):'';

  const map={}, submap={};
  es.filter(e=>e.type==='expense').forEach(e=>e.items.forEach(i=>{
    map[i.category]=(map[i.category]||0)+lineSub(i);
    if(i.sub){submap[i.category]=submap[i.category]||{};
      submap[i.category][i.sub]=(submap[i.category][i.sub]||0)+lineSub(i)}
  }));
  const rows=Object.entries(map).sort((a,b)=>b[1]-a[1]);
  $('dTotal').textContent=yen(out);
  const ring='<circle cx="21" cy="21" r="15.9155" fill="none" stroke="#EDEFF2" stroke-width="5.2"/>';
  let off=0;
  $('donut').innerHTML=ring+(rows.length?rows.map(([c,v])=>{
    const p=v/out*100;
    const s=`<circle cx="21" cy="21" r="15.9155" fill="none" stroke="${cmeta('expense',c).color}" stroke-width="5.2" stroke-dasharray="${p.toFixed(2)} ${(100-p).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}"/>`;
    off+=p;return s;
  }).join(''):'');
  $('catList').innerHTML=rows.length?rows.map(([c,v])=>{
    const subs=submap[c]?Object.entries(submap[c]).sort((a,b)=>b[1]-a[1]):[];
    const col=cmeta('expense',c).color;
    const known=v-subs.reduce((s,[,sv])=>s+sv,0); // サブ未設定ぶん
    const open=openCats.has(c);
    const head=`<div class="crow ${subs.length?'has-sub':''}" ${subs.length?`data-cat="${esc(c)}"`:''}>
        <span class="dot" style="background:${col}"></span>
        <span class="cname">${subs.length?`<span class="caret ${open?'open':''}">▸</span>`:''}${esc(c)}</span>
        <span class="cpct num">${Math.round(v/out*100)}%</span>
        <span class="camt num">${yen(v)}</span>
      </div>`;
    let body='';
    if(subs.length&&open){
      body=subs.map(([s,sv])=>`<div class="subrow">
          <span class="cname">${esc(s)}</span>
          <span class="cpct num">${Math.round(sv/v*100)}%</span>
          <span class="camt num">${yen(sv)}</span>
        </div>`).join('');
      if(known>0)body+=`<div class="subrow"><span class="cname">その他・未設定</span>
          <span class="cpct num">${Math.round(known/v*100)}%</span><span class="camt num">${yen(known)}</span></div>`;
    }
    return head+body;
  }).join(''):'<p class="empty">支出の記録があると内訳が出ます</p>';

  $('history').innerHTML=es.length?groupHTML(es):'<div class="card"><p class="empty">この月の記録はまだありません</p></div>';
  $('recent').innerHTML=es.length?'<div class="items">'+es.slice(0,5).map(itemHTML).join('')+'</div>':'<p class="empty">「＋」から入力できます</p>';

  $('totalBudget').value=b||'';
  $('tbBar').style.width=Math.min(100,pct)+'%';
  $('tbBar').className=over?'over':pct>=80?'warn':'';
  $('tbUsed').textContent=b?yen(out)+' 使用':'予算が未設定です';
  $('tbLeft').textContent=b?(over?yen(out-b)+' 超過':yen(b-out)+' 残り'):'';
  $('catBudgets').innerHTML=cats('expense').map(c=>{
    const cb=(d.catBudgets[k]||{})[c.name]||0, used=map[c.name]||0;
    const p=cb?used/cb*100:0, ov=cb&&used>cb;
    return `<div class="brow">
      <div class="brow-t">
        <span class="dot" style="background:${c.color}"></span>
        <span class="cname">${esc(c.name)}</span>
        <input type="number" inputmode="numeric" min="0" placeholder="0" value="${cb||''}" data-cat="${esc(c.name)}">
      </div>
      <div class="bar"><i style="width:${Math.min(100,p)}%" class="${ov?'over':p>=80?'warn':''}"></i></div>
      <div class="b-foot"><span>${yen(used)} 使用</span><span>${cb?(ov?yen(used-cb)+' 超過':yen(cb-used)+' 残り'):'予算なし'}</span></div>
    </div>`;
  }).join('');

  renderManage();renderYears();
  const st=[...new Set(d.entries.slice().reverse().map(e=>e.store).filter(Boolean))].slice(0,40);
  $('storeList').innerHTML=st.map(s=>`<option value="${esc(s)}">`).join('');
}
function groupHTML(es){
  const g={};es.forEach(e=>(g[e.date]=g[e.date]||[]).push(e));
  const W=['日','月','火','水','木','金','土'];
  return Object.keys(g).map(date=>{
    const dt=new Date(date+'T00:00:00');
    const sum=g[date].reduce((s,e)=>s+(e.type==='expense'?total(e):0),0);
    return `<div class="daygroup">
      <div class="dayhead">
        <span>${dt.getMonth()+1}月${dt.getDate()}日(${W[dt.getDay()]})</span>
        <span class="num">${sum?'支出 '+yen(sum):''}</span>
      </div>
      <div class="items">${g[date].map(itemHTML).join('')}</div>
    </div>`;
  }).join('');
}
function itemHTML(e){
  const m=cmeta(e.type,e.items[0]?e.items[0].category:'');
  const uniq=[...new Set(e.items.map(i=>i.category))];
  const one=e.items[0];
  const nameQty=one?(one.name+((one.qty||1)>1?' ×'+one.qty:'')):'';
  const catLabel=one?(one.category+(one.sub?' › '+one.sub:'')):'';
  const sub=e.items.length>1?uniq.join('・'):[nameQty,catLabel].filter(Boolean).join(' ・ ');
  return `<button class="item" data-id="${e.id}">
    <span class="icon" style="background:${m.color}1F">${m.icon}</span>
    <span class="i-main">
      <span class="i-title">${esc(e.store||uniq[0]||'（店名なし）')}${e.items.length>1?`<span class="badge">${e.items.length}件</span>`:''}</span>
      <span class="i-sub">${esc(sub)}${e.memo?' ・ '+esc(e.memo):''}</span>
    </span>
    <span class="i-amt num ${e.type==='expense'?'out':'in'}">${e.type==='expense'?'−':'+'}${yen(total(e)).slice(1)}</span>
  </button>`;
}

/* ============ タブ / 月送り ============ */
function showTab(n){
  ['home','book','budget','set'].forEach(t=>$('tab-'+t).hidden=t!==n);
  document.querySelectorAll('.tabs button').forEach(b=>b.setAttribute('aria-selected',b.dataset.tab===n));
  window.scrollTo(0,0);
}
document.querySelector('.tabs').onclick=e=>{const b=e.target.closest('button');if(b)showTab(b.dataset.tab)};
document.body.addEventListener('click',e=>{const g=e.target.closest('[data-goto]');if(g)showTab(g.dataset.goto)});
$('catList').addEventListener('click',async e=>{
  const row=e.target.closest('.crow.has-sub');if(!row)return;
  const c=row.dataset.cat;
  if(openCats.has(c))openCats.delete(c);else openCats.add(c);
  await render();
});
$('prev').onclick=async()=>{cur=new Date(Y(),cur.getMonth()-1,1);await render()};
$('next').onclick=async()=>{cur=new Date(Y(),cur.getMonth()+1,1);await render()};

/* ---- 年月ジャンプ ---- */
const open=el=>{el.classList.add('open');$('scrim').classList.add('open')};
const closeAll=()=>{document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('open'));$('scrim').classList.remove('open')};
$('monthLabel').onclick=async()=>{
  const now=new Date().getFullYear();
  const ys=[...new Set([...meta.years,now,Y()])];
  const lo=Math.min(...ys)-1, hi=Math.max(...ys)+1, list=[];
  for(let y=lo;y<=hi;y++)list.push(y);
  $('ySel').innerHTML=list.map(y=>`<option value="${y}" ${y===Y()?'selected':''}>${y}年</option>`).join('');
  await drawMonths(Y());open($('ymSheet'));
};
async function drawMonths(y){
  const d=await year(y);
  const sums=Array(12).fill(0);
  d.entries.forEach(e=>{if(e.type==='expense')sums[+e.date.slice(5,7)-1]+=total(e)});
  $('mGrid').innerHTML=sums.map((s,i)=>`
    <button data-m="${i}" aria-current="${y===Y()&&i===cur.getMonth()}">
      <b>${i+1}月</b><span>${s?yen(s):''}</span>
    </button>`).join('');
}
$('ySel').onchange=e=>drawMonths(+e.target.value);
$('mGrid').onclick=async e=>{
  const b=e.target.closest('[data-m]');if(!b)return;
  cur=new Date(+$('ySel').value,+b.dataset.m,1);
  closeAll();await render();
};

/* ============ 入力 ============ */
function catOpts(sel){
  return cats(type).map(x=>`<option value="${esc(x.name)}" ${x.name===sel?'selected':''}>${x.icon} ${esc(x.name)}</option>`).join('');
}
function subOpts(cat,sel){
  const subs=subsOf(type,cat);
  if(!subs.length)return '';
  return `<option value="">サブ（任意）</option>`+
    subs.map(s=>`<option value="${esc(s)}" ${s===sel?'selected':''}>${esc(s)}</option>`).join('');
}
function drawLines(){
  $('lines').innerHTML=lines.map((l,i)=>{
    const subs=subsOf(type,l.category);
    return `
    <div class="line">
      <div class="line-a">
        <input class="nm" data-i="${i}" data-f="name" value="${esc(l.name)}" placeholder="品名（例：海苔弁当）" maxlength="30">
      </div>
      <div class="line-b">
        <span class="qty-wrap">¥<input class="am" data-i="${i}" data-f="amount" type="number" inputmode="numeric" min="0" value="${l.amount}" placeholder="0"></span>
        <span class="qty-wrap">×<input class="qty" data-i="${i}" data-f="qty" type="number" inputmode="numeric" min="1" value="${l.qty||1}">個</span>
        <span class="sub" data-subtotal="${i}">${yen(lineSub(l))}</span>
      </div>
      <div class="line-c">
        <select data-i="${i}" data-f="category">${catOpts(l.category)}</select>
        ${subs.length?`<select data-i="${i}" data-f="sub">${subOpts(l.category,l.sub)}</select>`:''}
        <button type="button" class="rm" data-rm="${i}" aria-label="この明細を消す">✕</button>
      </div>
    </div>`;
  }).join('');
  sumLines();
}
const sumLines=()=>$('lineTotal').textContent=yen(lines.reduce((s,l)=>s+lineSub(l),0));
function refreshSub(i){
  const el=$('lines').querySelector(`[data-subtotal="${i}"]`);
  if(el)el.textContent=yen(lineSub(lines[i]));
}
$('lines').addEventListener('input',e=>{
  const t=e.target;if(t.dataset.i===undefined)return;
  const i=+t.dataset.i;
  lines[i][t.dataset.f]=t.dataset.f==='qty'?(Math.max(1,Math.floor(Number(t.value)||1))):t.value;
  if(t.dataset.f==='amount'||t.dataset.f==='qty'){refreshSub(i);sumLines()}
});
$('lines').addEventListener('change',e=>{
  const t=e.target;if(t.dataset.i===undefined)return;
  const i=+t.dataset.i;
  if(t.dataset.f==='category'){
    lines[i].category=t.value;lines[i].sub='';  // メインを変えたらサブは解除
    drawLines();  // サブ欄の出し入れのため再描画
  }else if(t.dataset.f==='sub'){
    lines[i].sub=t.value;
  }
});
$('lines').addEventListener('click',e=>{
  const b=e.target.closest('[data-rm]');if(!b)return;
  lines.splice(+b.dataset.rm,1);
  if(!lines.length)lines=[blank()];
  drawLines();
});
$('addLine').onclick=()=>{
  lines.push(blank());drawLines();
  const n=$('lines').querySelectorAll('.nm');n[n.length-1].focus();
};
$('typeSeg').onclick=e=>{
  const b=e.target.closest('button');if(!b)return;
  type=b.dataset.type;
  [...$('typeSeg').children].forEach(x=>x.setAttribute('aria-pressed',x===b));
  $('storeLabel').textContent=type==='expense'?'店名':'内容';
  $('fStore').placeholder=type==='expense'?'セブンイレブン':'勤務先など';
  lines.forEach(l=>{if(!cats(type).some(c=>c.name===l.category))l.category=(cats(type)[0]||FALLBACK).name});
  drawLines();
};
const today=()=>{const t=new Date();return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0')};
function openSheet(e){
  editId=e?e.id:null;
  type=e?e.type:'expense';
  [...$('typeSeg').children].forEach(x=>x.setAttribute('aria-pressed',x.dataset.type===type));
  $('storeLabel').textContent=type==='expense'?'店名':'内容';
  $('fStore').placeholder=type==='expense'?'セブンイレブン':'勤務先など';
  lines=e?e.items.map(i=>({...i,qty:i.qty||1,sub:i.sub||''})):[blank()];
  $('fStore').value=e?(e.store||''):'';
  $('fDate').value=e?e.date:today();
  $('fMemo').value=e?(e.memo||''):'';
  $('del').hidden=!e;
  $('saveBtn').textContent=e?'変更を保存':'保存';
  drawLines();open($('sheet'));
}
$('fab').onclick=()=>openSheet(null);
$('scrim').onclick=closeAll;
document.onkeydown=e=>{if(e.key==='Escape')closeAll()};
document.body.addEventListener('click',async e=>{
  const b=e.target.closest('.item');if(!b)return;
  const d=await year(Y());
  const en=d.entries.find(x=>String(x.id)===b.dataset.id);
  if(en)openSheet(en);
});
$('saveBtn').onclick=async()=>{
  const date=$('fDate').value;
  if(!date){toast('日付を入力してください');return}
  const items=lines.map(l=>{
      const sub=(l.sub&&subsOf(type,l.category).includes(l.sub))?l.sub:'';
      return {name:l.name.trim(),category:l.category,sub,
        amount:Math.floor(Number(l.amount)||0),qty:Math.max(1,Math.floor(Number(l.qty)||1))};
    })
    .filter(i=>i.amount>0);
  if(!items.length){toast('明細の金額を入力してください');return}
  const data={date,type,store:$('fStore').value.trim(),memo:$('fMemo').value.trim(),items};
  const ny=+date.slice(0,4);
  if(editId){
    const oy=Y(), od=await year(oy);
    if(ny!==oy){
      od.entries=od.entries.filter(x=>x.id!==editId);await saveYear(oy);
      const nd=await year(ny);nd.entries.push({id:editId,...data});await saveYear(ny);
    }else{Object.assign(od.entries.find(x=>x.id===editId),data);await saveYear(oy)}
  }else{
    const nd=await year(ny);nd.entries.push({id:Date.now(),...data});await saveYear(ny);
  }
  cur=new Date(ny,+date.slice(5,7)-1,1);
  closeAll();await render();toast(editId?'変更しました':'保存しました');
};
$('del').onclick=async()=>{
  const d=await year(Y());
  d.entries=d.entries.filter(e=>e.id!==editId);
  await saveYear(Y());closeAll();await render();toast('削除しました');
};

/* ============ 予算 ============ */
$('totalBudget').onchange=async e=>{
  const d=await year(Y()), v=Math.max(0,Math.floor(Number(e.target.value)||0));
  if(v>0)d.budgets[mkey(cur)]=v;else delete d.budgets[mkey(cur)];
  await saveYear(Y());await render();
};
$('catBudgets').onchange=async e=>{
  if(!e.target.dataset.cat)return;
  const d=await year(Y()), k=mkey(cur);
  d.catBudgets[k]=d.catBudgets[k]||{};
  const v=Math.max(0,Math.floor(Number(e.target.value)||0));
  if(v>0)d.catBudgets[k][e.target.dataset.cat]=v;else delete d.catBudgets[k][e.target.dataset.cat];
  await saveYear(Y());await render();
};
$('copyPrev').onclick=async()=>{
  const p=new Date(Y(),cur.getMonth()-1,1), pd=await year(p.getFullYear()), pk=mkey(p);
  const d=await year(Y()), k=mkey(cur);
  if(!pd.budgets[pk]&&!pd.catBudgets[pk]){toast('先月の予算がありません');return}
  if(pd.budgets[pk])d.budgets[k]=pd.budgets[pk];
  if(pd.catBudgets[pk])d.catBudgets[k]={...pd.catBudgets[pk]};
  await saveYear(Y());await render();toast('先月の予算をコピーしました');
};

/* ============ カテゴリ管理 ============ */
$('mgSeg').onclick=e=>{
  const b=e.target.closest('button');if(!b)return;
  mgType=b.dataset.type;
  [...$('mgSeg').children].forEach(x=>x.setAttribute('aria-pressed',x===b));
  renderManage();
};
function renderManage(){
  const l=cats(mgType);
  $('mgList').innerHTML=l.map((c,i)=>`
    <div class="mrow">
      <span class="icon" style="background:${c.color}1F">${c.icon}</span>
      <span class="cname">${esc(c.name)}${c.subs&&c.subs.length?`<span class="badge">サブ${c.subs.length}</span>`:''}</span>
      <button class="move" data-mv="${i}" data-dir="-1" ${i===0?'disabled':''} aria-label="上へ">▲</button>
      <button class="move" data-mv="${i}" data-dir="1" ${i===l.length-1?'disabled':''} aria-label="下へ">▼</button>
      <button class="edit" data-ed="${i}">編集</button>
    </div>`).join('');
}
$('mgList').onclick=async e=>{
  const mv=e.target.closest('[data-mv]');
  if(mv){const i=+mv.dataset.mv,j=i+ +mv.dataset.dir,a=meta.cats[mgType];
    [a[i],a[j]]=[a[j],a[i]];await saveMeta();renderManage();return}
  const ed=e.target.closest('[data-ed]');
  if(ed)openCatSheet(cats(mgType)[+ed.dataset.ed]);
};
$('addCat').onclick=()=>openCatSheet(null);
function openCatSheet(c){
  csEdit=c?c.name:null;csIcon=c?c.icon:'📦';csColor=c?c.color:'#9AA3AC';
  csSubs=c&&c.subs?[...c.subs]:[];
  $('csTitle').textContent=c?'カテゴリを編集':'カテゴリを追加';
  $('csName').value=c?c.name:'';$('csDel').hidden=!c;
  $('csSubWrap').hidden=!c;         // 追加時は保存後にサブを足せる（新規は一旦名前だけ）
  $('csSubInput').value='';
  drawPickers();drawSubs();open($('catSheet'));
}
function drawSubs(){
  $('csSubList').innerHTML=csSubs.length?csSubs.map((s,i)=>`
    <div class="subrow-edit">
      <span class="sname">${esc(s)}</span>
      <button type="button" class="sdel" data-sd="${i}" aria-label="削除">✕</button>
    </div>`).join(''):'<p class="hint" style="padding:6px 0">まだありません</p>';
}
$('csSubList').onclick=e=>{
  const b=e.target.closest('[data-sd]');if(!b)return;
  csSubs.splice(+b.dataset.sd,1);drawSubs();
};
$('csSubAdd').onclick=()=>{
  const v=$('csSubInput').value.trim();
  if(!v)return;
  if(csSubs.includes(v)){toast('同じサブがあります');return}
  csSubs.push(v);$('csSubInput').value='';drawSubs();$('csSubInput').focus();
};
$('csSubInput').onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();$('csSubAdd').click()}};
function drawPickers(){
  $('csIcons').innerHTML=ICONS.map(i=>`<button type="button" data-i="${i}" aria-pressed="${i===csIcon}">${i}</button>`).join('');
  $('csColors').innerHTML=COLORS.map(c=>`<button type="button" data-c="${c}" style="background:${c}" aria-pressed="${c===csColor}" aria-label="${c}"></button>`).join('');
}
$('csIcons').onclick=e=>{const b=e.target.closest('button');if(b){csIcon=b.dataset.i;drawPickers()}};
$('csColors').onclick=e=>{const b=e.target.closest('button');if(b){csColor=b.dataset.c;drawPickers()}};
async function eachYear(fn){
  for(const y of meta.years){const d=await year(y);if(fn(d))await saveYear(y)}
}
$('csSave').onclick=async()=>{
  const name=$('csName').value.trim();
  if(!name){toast('名前を入力してください');return}
  if(cats(mgType).some(c=>c.name===name&&c.name!==csEdit)){toast('同じ名前のカテゴリがあります');return}
  if(csEdit){
    if(name!==csEdit){
      await eachYear(d=>{
        let t=false;
        d.entries.forEach(e=>{if(e.type===mgType)e.items.forEach(i=>{if(i.category===csEdit){i.category=name;t=true}})});
        Object.values(d.catBudgets).forEach(m=>{if(m[csEdit]!==undefined){m[name]=m[csEdit];delete m[csEdit];t=true}});
        return t;
      });
    }
    // 削除されたサブに紐づく明細は、サブだけ外す（メインは残す）
    const removed=(cats(mgType).find(x=>x.name===csEdit).subs||[]).filter(s=>!csSubs.includes(s));
    if(removed.length){
      await eachYear(d=>{
        let t=false;
        d.entries.forEach(e=>{if(e.type===mgType)e.items.forEach(i=>{
          if(i.category===name&&removed.includes(i.sub)){i.sub='';t=true}})});
        return t;
      });
    }
    Object.assign(cats(mgType).find(x=>x.name===csEdit),{name,icon:csIcon,color:csColor,subs:[...csSubs]});
  }else meta.cats[mgType].push({name,icon:csIcon,color:csColor,subs:[]});
  await saveMeta();closeAll();await render();toast(csEdit?'変更しました':'追加しました');
};
$('csDel').onclick=async()=>{
  let used=0;
  for(const y of meta.years){const d=await year(y);
    d.entries.forEach(e=>{if(e.type===mgType)e.items.forEach(i=>{if(i.category===csEdit)used++})})}
  if(!confirm(used?`「${csEdit}」を削除すると、${used}件の明細が「未分類」になります。よろしいですか？`
                  :`「${csEdit}」を削除します。よろしいですか？`))return;
  await eachYear(d=>{
    let t=false;
    d.entries.forEach(e=>{if(e.type===mgType)e.items.forEach(i=>{if(i.category===csEdit){i.category='未分類';t=true}})});
    Object.values(d.catBudgets).forEach(m=>{if(m[csEdit]!==undefined){delete m[csEdit];t=true}});
    return t;
  });
  meta.cats[mgType]=cats(mgType).filter(c=>c.name!==csEdit);
  await saveMeta();closeAll();await render();toast('削除しました');
};

/* ============ バックアップ ============ */
function renderYears(){
  const ys=[...new Set([...meta.years,Y(),new Date().getFullYear()])].sort();
  const sel=$('yearSel'), keep=sel.value;
  sel.innerHTML=ys.map(y=>`<option value="${y}">${y}年</option>`).join('');
  sel.value=keep&&ys.includes(+keep)?keep:Y();
  $('whereHint').textContent=useChat
    ? '保存先：このチャット環境。ダウンロードして端末で開くと、ブラウザ内（localStorage）に切り替わります。'
    : '保存先：このブラウザ（localStorage）。年ごとに分けて保存しています。履歴やサイトデータを消すと家計簿も消えるので、月に一度は書き出しておくと安心です。';
}
async function exportFile(name,obj){
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  try{
    const f=new File([blob],name,{type:'application/json'});
    if(navigator.canShare&&navigator.canShare({files:[f]})){await navigator.share({files:[f]});return true}
  }catch(e){if(e&&e.name==='AbortError')return false}
  const u=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(u),1500);
  return true;
}
const pack=async ys=>{
  const data={};
  for(const y of ys)data[y]=await year(y);
  return {app:'kakeibo',version:2,exportedAt:new Date().toISOString(),cats:meta.cats,years:ys,data};
};
$('expOne').onclick=async()=>{
  const y=+$('yearSel').value;
  if(await exportFile(`kakeibo-${y}.json`,await pack([y])))toast(y+'年を書き出しました');
};
$('expAll').onclick=async()=>{
  const ys=[...new Set([...meta.years,Y()])].sort();
  if(await exportFile(`kakeibo-${ys[0]}-${ys[ys.length-1]}.json`,await pack(ys)))toast('全期間を書き出しました');
};
$('impBtn').onclick=()=>$('impFile').click();
$('impFile').onchange=async e=>{
  const f=e.target.files[0];if(!f)return;
  e.target.value='';
  try{
    const j=JSON.parse(await f.text());
    if(j.app!=='kakeibo'||!j.data)throw 0;
    const ys=Object.keys(j.data);
    if(!confirm(`${ys.join('・')}年のデータを読み込みます。同じ年の今のデータは上書きされます。よろしいですか？`))return;
    if(j.cats){meta.cats=j.cats;await saveMeta()}
    for(const y of ys){cache[+y]=j.data[y];await saveYear(+y)}
    await render();toast('読み込みました');
  }catch(err){toast('このファイルは読み込めません')}
};
$('wipe').onclick=async()=>{
  if(!confirm('すべての記録・予算・カテゴリ設定を消します。元に戻せません。よろしいですか？'))return;
  for(const y of meta.years)await store.set(YK(y),{entries:[],budgets:{},catBudgets:{}});
  Object.keys(cache).forEach(k=>delete cache[k]);
  meta={cats:null,years:[]};seedCats();await saveMeta();
  await render();toast('すべて消しました');
};

/* ============ 起動 ============ */
(async()=>{
  if(!canSave){
    const w=$('warnBanner');w.hidden=false;
    w.textContent='このブラウザではデータを保存できません（プライベートブラウズ等）。設定を確認してください。';
  }
  meta=await store.get(MK)||{cats:null,years:[]};
  if(!meta.years)meta.years=[];
  if(!meta.cats){seedCats();await migrate();await saveMeta()}
  else{ // 旧データにsubs配列を補完
    let patched=false;
    for(const t of ['expense','income'])(meta.cats[t]||[]).forEach(c=>{if(!c.subs){c.subs=[];patched=true}});
    if(patched)await saveMeta();
  }
  await year(Y());
  await render();
})();
</script>
</body>
</html>
